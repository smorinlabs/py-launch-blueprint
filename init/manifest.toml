command = ["bun", "install"]

# Reset (not rewrite) on init: CHANGELOG.md accumulates the blueprint's own
# release history (compare-URLs, `plbp`, `smorinlabs`); a fork starts its own,
# populated by release-please from the fork's first release.
[[reset]]
path = "CHANGELOG.md"
stub = "# Changelog\n"
