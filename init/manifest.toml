[[remove]]
path   = ".github/workflows/blueprint-guard.yml"
reason = "guard CI is blueprint-only"

[[remove]]
path   = "init/discover.py"
reason = "Phase-0 one-off discovery script"

[[regenerate]]
path    = "uv.lock"
command = ["uv", "lock"]

[[regenerate]]
path    = "bun.lock"
command = ["bun", "install"]
