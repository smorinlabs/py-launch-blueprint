# ITM-003 — lefthook scaffolding. Hook manager per ADR-01.
# Stage blocks are intentionally absent — per-tool ITMs add them:
#   commit-msg:  ITM-040 (commitlint)
#   pre-commit:  ITM-001 (gitleaks), ITM-010 (editorconfig-checker),
#                ITM-013 (yamllint), ITM-016 (codespell), ITM-066 (ruff/ty/uv-export)
#   pre-push:    ITM-002 (gitleaks range scan), ITM-032 (bandit)
# See lefthook docs: https://lefthook.dev/configuration/

min_version: 1.13.0  # ITM-021 installer floor

# ITM-040 — commitlint commit-msg step. Decided round 7.
commit-msg:
  commands:
    commitlint:
      run: bunx --bun commitlint --edit {1}

# Pre-commit stage — per-tool steps land via downstream ITMs.
pre-commit:
  parallel: true
  commands:
    # ITM-001 — gitleaks staged-diff scan (decided round 2).
    gitleaks:
      run: scripts/check-gitleaks.sh --staged
