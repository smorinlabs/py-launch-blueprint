# ITM-003 — lefthook scaffolding. Hook manager per ADR-01.
# Stage blocks are intentionally absent — per-tool ITMs add them.
# Wired checks (kept in ↔ CI parity per ADR 0018):
#   commit-msg:  ITM-040 (commitlint)
#   pre-commit:  ITM-001 (gitleaks staged), ITM-010 (editorconfig-checker),
#                ITM-013 (yamllint), ITM-016 (codespell),
#                ITM-066 (ruff check + ruff format), taplo (ADR 0018)
#   pre-push:    ITM-002 (gitleaks range scan), ITM-032 (bandit),
#                HEX-30 (import-linter), HEX-31 (tach, ADR 0018),
#                ty typecheck (ADR-03 / ADR 0018), init-system integrity
# Tiering: fast staged-scoped checks at pre-commit; slower full-tree checks
# at pre-push. CI (.github/workflows/ci.yml + lint.yml) is the authority —
# every correctness gate must also exist there.
# See lefthook docs: https://lefthook.dev/configuration/

min_version: 1.13.0  # ITM-021 installer floor

# ITM-040 — commitlint commit-msg step. Revised 2026-07-21.
# Runs the repo-local binary `./node_modules/.bin/commitlint`, so the version
# comes from bun.lock and the hook works in every supported toolchain path
# (native `just setup`, mise, flox) with no dependency on any global install.
#
# It previously ran `bunx --bun @commitlint/cli`. That pins no version, so bunx
# resolved `@latest` into its own ephemeral cache, landed on a
# `@commitlint/config-conventional` newer than this repo's pin, and failed to
# link `conventional-changelog-conventionalcommits`. The package was in
# node_modules the whole time — only bunx's resolution context could not see
# it. Every commit in this repo failed.
#
# A bare `commitlint` was tried first and rejected in review: it resolves only
# where a global mise pin happens to exist, and exits 127 on any machine
# without one — failing every commit regardless of message validity. Measured:
# bare -> 127/127 on a PATH without that pin; ./node_modules/.bin -> 0 for a
# valid message, 1 for an invalid one.
#
# Requires `bun install` in fresh checkouts and worktrees, both for the binary
# and so `commitlint.config.mjs` can resolve `@commitlint/config-conventional`.
commit-msg:
  commands:
    commitlint:
      run: ./node_modules/.bin/commitlint --edit {1}

# Pre-commit stage — per-tool steps land via downstream ITMs.
pre-commit:
  parallel: true
  commands:
    # ITM-001 — gitleaks staged-diff scan (decided round 2).
    gitleaks:
      run: scripts/check-gitleaks.sh --staged
    # ITM-010 — editorconfig-checker staged-only (decided round 9).
    # The PyPI wheel bundles the Go binary (the npm wrapper downloads it at
    # runtime and flakes with TAR_BAD_ARCHIVE).
    # Note: the Go binary uses single-dash flags (-config, not --config).
    # WL-001: `uv run` (locked dev group), not floating `uvx` — hooks and CI
    # run the exact version in uv.lock.
    editorconfig-checker:
      run: >-
        uv run ec
        -config .editorconfig-checker.json
        {staged_files}
    # ITM-013 — yamllint staged YAML only (decided round 2).
    yamllint:
      glob: "*.{yml,yaml}"
      run: uv run yamllint -c .yamllint {staged_files}
    # ADR 0018 — actionlint on staged workflow files (local mirror of the
    # lint.yml actionlint job). actionlint is the 11th toolchain tool (ADR
    # 0005, amended by 0018) — installed by `just setup`; guard + fail with
    # guidance rather than skipping silently. It auto-uses shellcheck for
    # embedded run: blocks when present (CI's runner ships it).
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: >-
        command -v actionlint >/dev/null 2>&1 ||
        { echo "FAIL: actionlint missing — run just install-actionlint" >&2; exit 1; }
        && actionlint {staged_files}
    # ITM-016 — codespell staged files (decided round 9).
    codespell:
      run: uv run codespell --toml pyproject.toml {staged_files}
    # ITM-066 — ruff lint + format check on staged Python files.
    # Added after PR #319 hit lint failures in CI that should have been
    # caught locally. `{staged_files}` keeps the check scoped — fast.
    # `--force-exclude` so explicit staged paths still honor the
    # [tool.ruff] exclude list (e.g. docs/source/conf.py), matching CI's
    # `ruff check .` behavior.
    ruff-check:
      glob: "*.py"
      run: uv run ruff check --force-exclude --output-format=concise {staged_files}
    ruff-format:
      glob: "*.py"
      run: uv run ruff format --check --force-exclude {staged_files}
    # ADR 0018 — taplo TOML format check on staged *.toml (mirrors CI's
    # toml-format job). taplo is NOT in the locked dev group — it ships via
    # `just install-taplo` (run by `just setup`; also in mise/flox per ADR
    # 0005). Guard for the binary and fail with guidance rather than skipping
    # silently, so a stale TOML never slips past to a red CI run.
    taplo:
      glob: "*.toml"
      run: >-
        command -v taplo >/dev/null 2>&1 ||
        { echo "FAIL: taplo not on PATH — run just install-taplo" >&2; exit 1; }
        && taplo check {staged_files} --config .taplo.toml
    # ADR 0018 — lockfile freshness. CI's `uv sync --locked` fails late (only
    # in the heavy jobs) when pyproject deps change without a re-lock; catch it
    # at commit time when those files are staged. `--check` is read-only.
    uv-lock-check:
      glob: "{pyproject.toml,uv.lock}"
      run: uv lock --check
    # ADR 0018 — local mirror of the large-file-guard CI workflow (ITM-028):
    # reject staged files over 1 MB unless under docs/assets/. Catches a big
    # blob before the push round-trip. Same 1 MB threshold + allowlist as CI.
    large-files:
      run: |
        threshold=1048576
        status=0
        for f in {staged_files}; do
          case "$f" in docs/assets/*) continue ;; esac
          [ -f "$f" ] || continue
          size=$(wc -c <"$f" | tr -d ' ')
          if [ "$size" -gt "$threshold" ]; then
            echo "FAIL: $f is $size bytes (>1MB); use docs/assets/ or drop it" >&2
            status=1
          fi
        done
        exit $status

# Pre-push stage — per-tool steps land via downstream ITMs.
pre-push:
  parallel: true
  commands:
    # ITM-002 — gitleaks range scan (catches bypassed/imported commits).
    gitleaks-range:
      run: scripts/check-gitleaks.sh --range
    # ITM-032 — bandit (security linting) at pre-push (round-3 decision:
    # pre-push, not pre-commit, since full-tree scan is too slow per commit).
    # WL-001: locked via the dev group (`uv run`, not floating `uvx`).
    bandit:
      run: uv run bandit -r src/py_launch_blueprint/ -c pyproject.toml
    # ADR 0018 — ty typecheck at pre-push, mirroring CI's typecheck job.
    # Pre-push (not pre-commit) since it is a full-tree check, too slow per
    # commit (same tier as bandit). `--extra web` so web/ imports resolve
    # (matches ADR-03 / the just typecheck recipe). WL-001: locked dev group.
    ty:
      run: uv run --extra web ty check src/py_launch_blueprint/
    # HEX-30 — architectural import boundaries (import-linter). At pre-push
    # (not pre-commit) since it builds the whole import graph. WL-001: locked
    # via the dev group. Now also authoritatively gated in CI (ADR 0018).
    import-boundaries:
      run: uv run lint-imports
    # HEX-31 — bounded-context boundaries (tach). Added at pre-push alongside
    # import-linter for local parity with the CI import-boundaries job (ADR
    # 0018). WL-001: locked via the dev group.
    module-boundaries:
      run: uv run tach check
    # ADR 0018 — OpenAPI snapshot drift. The committed docs/api/openapi.json
    # must match the live FastAPI schema; the api-contract CI workflow + this
    # test enforce it. Gated on web-layer changes so non-web pushes skip it;
    # mirrors `just export-openapi` having been run after a route change.
    openapi-snapshot:
      glob: "src/py_launch_blueprint/web/**/*"
      run: uv run --extra web pytest tests/web/test_openapi_snapshot.py -q
    # Init-system integrity — these are the checks the blueprint-guard
    # CI workflow runs. Caught locally at pre-push, they prevent the
    # "push → CI fails → push again" cycle that PR #319 went through.
    # `uv run --script` (not `uv run python ...`) so PEP 723 inline metadata
    # is honored — check_path_filter.py needs pyyaml from its dep block.
    # Marker-gate (P0004 dogfood D-v2-3 / PROBLEM-11): these are
    # blueprint-maintenance checks. In a generated repo the init marker
    # exists, so `test -f … || <cmd>` short-circuits to a no-op (the `test`
    # succeeds, so the `||` right side never runs — exit 0) — forks must not
    # run the blueprint's own drift/wiring/test machinery (same marker-gating
    # principle as init/guard.sh). The blueprint has no marker, so the `test`
    # fails and all four checks run unchanged here.
    init-guard-wiring:
      run: >-
        test -f init/.blueprint-initialized ||
        uv run --script init/ci/check_guard_wiring.py
    init-manifest-drift:
      run: >-
        test -f init/.blueprint-initialized ||
        uv run --script init/ci/check_manifest_drift.py
    init-path-filter:
      run: >-
        test -f init/.blueprint-initialized ||
        uv run --script init/ci/check_path_filter.py
    # Init unit tests (~3s; safe at pre-push, too slow for pre-commit).
    # `--override-ini=addopts=` because the project default excludes
    # slow/live markers — init tests aren't marked so they need explicit
    # override to run consistently regardless of marker config drift.
    #
    # `env -u GIT_*` scrubs pre-push environment variables that git sets
    # before running the hook. The init/tests fixtures spawn `git commit`
    # in pytest tmp dirs; inherited `GIT_DIR` makes those subprocesses
    # operate on the OUTER worktree instead of the tmp dir — which both
    # makes tests fail (no commit happens in tmp -> guard.sh sees no repo)
    # AND can author a "Test Fixture <test@example.com>" commit against the
    # real blueprint repo (the 152-file-deletion class — see commit feb0938).
    # Scrubbing the env before pytest starts covers `_git()`, `guard.sh`,
    # and `init.py` subprocesses uniformly.
    init-tests:
      run: >-
        test -f init/.blueprint-initialized ||
        env -u GIT_DIR -u GIT_WORK_TREE -u GIT_INDEX_FILE
        -u GIT_OBJECT_DIRECTORY -u GIT_COMMON_DIR -u GIT_PREFIX
        uv run pytest init/tests/ --override-ini="addopts=" -q
