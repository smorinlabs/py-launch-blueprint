# ITM-031 - TruffleHog secret-scan CI. --only-verified scope (decided round 3).
# Pairs with gitleaks at lefthook (ITM-001/002) for two-layer coverage per ADR-02.

name: secret-scan

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # Range scan needs full history to compare base..head.
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@v3.95.5
        with:
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          # ITM-031 round-3: verified-only (gitleaks covers unverified patterns).
          extra_args: --only-verified
