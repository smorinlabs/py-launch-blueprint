# ITM-029 - actionlint workflow. Validates .github/workflows/*.yml syntax
# and shell-script content of `run:` blocks. Decided round 3.

name: actionlint

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/**
  pull_request:
    paths:
      - .github/workflows/**

permissions: {}

concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        # ITM-029 round-3 decision: enable shellcheck (GitHub-hosted runners
        # ship shellcheck; no install needed).
        uses: rhysd/actionlint@v1.7.7
        with:
          version: "1.7.7"
