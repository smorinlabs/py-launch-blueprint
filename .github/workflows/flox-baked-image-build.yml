name: flox-baked-image-build
on:
  workflow_dispatch:
    inputs:
      tag:
        description: image tag to push
        type: string
        default: latest
      ref:
        description: branch/ref whose Dockerfile.full + .flox to bake
        type: string
        default: experiment/flox-ci-timing-perf-analysis

permissions:
  contents: read
  packages: write

# Builds the flox-baked image (experiment/flox-ci-base/Dockerfile.full — the full
# dev flox env + warm uv cache) for linux/amd64 and pushes it to GHCR so the
# `flox-baked-consolidated` container side can pull it. Dispatch with
# --ref experiment/flox-ci-timing-perf-analysis so it bakes that branch's .flox.
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: experiment/flox-ci-base/Dockerfile.full
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/flox-ci-base-full:${{ inputs.tag }}
