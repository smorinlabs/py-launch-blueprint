name: mise-consolidated
on:
  workflow_dispatch:
    inputs:
      os:
        type: string
        required: true
      cache:
        type: string
        required: true

permissions:
  contents: read

jobs:
  hygiene:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: provision (mise)
        uses: ./.github/actions/provision-mise
        with:
          cache: ${{ inputs.cache }}
      - name: all hygiene checks under one mise env
        shell: bash
        run: |
          mise exec -- bash -euo pipefail -c '
            ruff check .
            ruff format --check .
            uv sync --group dev && uv run ty check py_launch_blueprint/
            taplo check "**/*.toml"
            codespell --toml pyproject.toml
            yamllint -c .yamllint .
            bandit -r py_launch_blueprint/ -c pyproject.toml
            gitleaks detect --source . --config .gitleaks.toml --no-banner
            bun install && commitlint --from=HEAD~10 --to=HEAD
          '

  pytest:
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v6
      - name: provision (mise)
        uses: ./.github/actions/provision-mise
        with:
          cache: ${{ inputs.cache }}
      - name: tests under one mise env
        shell: bash
        run: mise exec -- bash -c 'uv sync --group dev && uv run pytest -m "" --cov=py_launch_blueprint --cov-report=xml'
