# CI/CD - per-job split (ITM-024 hardening + ITM-025 lint + ITM-026 ty +
# ITM-030 matrix). Hygiene tools live in their own workflows (ITM-011/014/017).

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ITM-025 - lint job (ruff check + format --check). Decided round 3 (option B).
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Ruff check
        run: uvx ruff check .
      - name: Ruff format check
        run: uvx ruff format --check .

  # ITM-026 - typecheck job (ty, per ADR-03). Decided round 3 direct switch.
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync dev env (ty needs project deps on the python path)
        run: uv sync --group dev
      - name: ty check
        run: uv run ty check py_launch_blueprint/

  # ITM-030 - test matrix: ubuntu + macOS x py3.12/3.13 (decided round 3).
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false  # see all failures, not just the first (round-3)
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dev env
        run: uv sync --group dev  # PEP 735 (ITM-063)
      - name: Run tests with coverage
        # Default skips slow/live markers (ITM-046 addopts); CI runs everything.
        run: uv run pytest -m "" --cov=py_launch_blueprint --cov-report=xml
      - name: Upload coverage to Codecov
        # Single matrix combo uploads (avoids 4x duplicate reports).
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # Taplo (TOML formatter check) kept here for now; ITM-066 will fold into
  # justfile + add a dedicated workflow if needed.
  toml-format:
    name: toml-format-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install just
        uses: extractions/setup-just@v4
      # `just install-taplo` now downloads the upstream pre-built binary
      # (curl + gunzip from https://github.com/tamasfe/taplo/releases) —
      # ~1-3s installed vs the prior ~2min `cargo install taplo-cli`. Same
      # path as local dev; no external installer action needed.
      - name: Install taplo
        run: just install-taplo
      - name: Check TOML formatting
        run: taplo check '**/*.toml'
