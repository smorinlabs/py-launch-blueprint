name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ITM-024 - deny-all default; per-job grants its minimum (round 1).
permissions: {}

# ITM-024 - cancel superseded runs on new push to same ref (round 1).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: continuous-integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Install just
      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Install development dependencies
        run: |
          uv venv .venv
          uv sync --all-extras --dev
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      # Format code
      - name: Install Taplo
        run: just install-taplo

      # Run type checker
      - name: Run type checker
        run: uvx mypy py_launch_blueprint/

      # Check linters using ruff
      - name: Check linters (ruff)
        run: uvx ruff check py_launch_blueprint/

      - name: Check TOML formatting
        run: taplo check '**/*.toml'

      # Lefthook covers pre-commit framework retirement (ITM-020).
      # Per-job split lands via ITM-025..031.
