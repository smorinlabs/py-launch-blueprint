name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Just
      uses: extractions/setup-just@v2

    - name: Install development dependencies
      run: |
        uv venv .venv
        uv sync --all-extras --dev
        echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

    - name: Run type checker
      run: uvx mypy py_launch_blueprint/

    - name: Check linters with Ruff
      run: uvx ruff check py_launch_blueprint/

    - name: Check TOML formatting
      run: uvx taplo check '**/*.toml'

    - name: Run tests
      run: uvx --with-editable . pytest

  hygiene:
    name: Hygiene
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: yamllint
      run: uvx yamllint -c .yamllint .

    - name: codespell
      run: uvx codespell .

    - name: editorconfig-checker
      run: uvx --from editorconfig-checker ec

    - name: Check for large files
      run: |
        max_kb=500
        failed=0
        while IFS= read -r -d '' f; do
          if [ -f "$f" ]; then
            size=$(wc -c < "$f" | tr -d ' ')
            if [ "$size" -gt $((max_kb * 1024)) ]; then
              echo "::error file=$f::File is too large ($((size / 1024)) KB > ${max_kb} KB)"
              failed=1
            fi
          fi
        done < <(git ls-files -z)
        exit "$failed"

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Lint GitHub Actions workflows
      uses: reviewdog/action-actionlint@v1
      with:
        reporter: github-check
        fail_level: error

  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}

    - name: Scan for verified or unknown secrets
      uses: trufflesecurity/trufflehog@v3.95.3
      with:
        base: ${{ github.event.pull_request.base.sha || '' }}
        head: ${{ github.event.pull_request.head.sha || github.sha }}
        extra_args: --results=verified,unknown
