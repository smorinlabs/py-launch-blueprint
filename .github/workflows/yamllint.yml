# ITM-014 - yamllint CI job. Standalone, YAML-path triggered (decided round 3).

name: yamllint

on:
  push:
    branches: [main]
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - ".yamllint"
  pull_request:
    paths:
      - "**/*.yml"
      - "**/*.yaml"
      - ".yamllint"

permissions: {}

concurrency:
  group: yamllint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync locked dev tools
        # WL-001: locked via uv.lock, matching the pre-commit hook exactly.
        run: uv sync --locked --only-group dev
      - name: Run yamllint
        run: uv run --no-sync yamllint -c .yamllint .
