# ITM-027 - bandit security linting CI. Standalone job (decided round 3).
# Pairs with [tool.bandit] in pyproject.toml.

name: bandit

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: bandit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: bandit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run bandit
        # src/ path (post src-layout move); the old flat `py_launch_blueprint/`
        # path no longer exists, so the scan was silently covering nothing.
        run: uvx bandit -r src/py_launch_blueprint/ -c pyproject.toml
