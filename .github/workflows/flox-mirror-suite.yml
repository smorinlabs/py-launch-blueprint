name: flox-mirror-suite
on:
  workflow_dispatch:
    inputs:
      os:
        type: string
        required: true
      cache:
        type: string
        required: true

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/_checks.yml
    with:
      provisioner: flox
      os: ${{ inputs.os }}
      cache: ${{ inputs.cache }}
