# Dependabot config (ITM-061 pip + ITM-062 actions + ITM-043 npm).
# Per ADR-08: grouped updates, 5-day cooldown, template-shaped group names.
# Schedule day: Monday (decided round 13).

version: 2
updates:
  # ITM-061 - Python (pip) ecosystem.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5
    labels: ["dependencies", "python"]
    groups:
      runtime:
        patterns: ["click", "questionary", "python-dotenv", "thefuzz", "python-Levenshtein", "pyperclip", "requests", "rich"]
      dev-tools:
        patterns: ["pre-commit", "cogapp"]
      lint-and-format:
        patterns: ["ruff", "ty", "mypy", "types-*"]
      test:
        patterns: ["pytest*"]

  # ITM-062 - GitHub Actions ecosystem.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5
    labels: ["dependencies", "github-actions"]
    groups:
      github-actions:
        patterns: ["*"]

  # ITM-043 - npm (Bun) ecosystem; commitlint deps only for now.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5
    labels: ["dependencies", "npm"]
    groups:
      commitlint:
        patterns: ["@commitlint/*"]
